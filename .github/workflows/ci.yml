name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Compile package
        run: uv run python -m compileall packages __init__.py

      - name: Lint package
        run: uv run ruff check packages __init__.py
