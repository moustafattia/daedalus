name: Release Scorecard

on:
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check release-readiness evidence
        run: python scripts/release_scorecard.py --check
