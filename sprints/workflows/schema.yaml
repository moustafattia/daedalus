type: object
required:
  - workflow
  - schema-version
  - orchestrator
  - runtimes
  - actors
  - stages
  - gates
properties:
  workflow:
    enum: [change-delivery, issue-runner, release, triage]
  schema-version:
    type: integer
    enum: [1]
  instance:
    type: object
    additionalProperties: true
  repository:
    type: object
    additionalProperties: true
  tracker:
    type: object
    properties:
      kind:
        type: string
      github_slug:
        type: string
      active_states:
        type: array
        items:
          type: string
      terminal_states:
        type: array
        items:
          type: string
      required_labels:
        type: array
        items:
          type: string
      exclude_labels:
        type: array
        items:
          type: string
    additionalProperties: true
  intake:
    type: object
    properties:
      auto-activate:
        type: object
        properties:
          enabled:
            type: boolean
          add_label:
            type: string
          exclude_labels:
            type: array
            items:
              type: string
          max-per-tick:
            type: integer
            minimum: 1
        additionalProperties: true
    additionalProperties: true
  code-host:
    type: object
    properties:
      kind:
        type: string
      github_slug:
        type: string
    additionalProperties: true
  concurrency:
    type: object
    properties:
      max-active-lanes:
        type: integer
        minimum: 1
      max-implementers:
        type: integer
        minimum: 1
      max-reviewers:
        type: integer
        minimum: 1
      per-lane-lock:
        type: boolean
    additionalProperties: true
  recovery:
    type: object
    properties:
      running-stale-seconds:
        type: integer
        minimum: 0
      auto-retry-interrupted:
        type: boolean
    additionalProperties: true
  retry:
    type: object
    properties:
      max-attempts:
        type: integer
        minimum: 1
      initial-delay-seconds:
        type: integer
        minimum: 0
      backoff-multiplier:
        type: number
        minimum: 1
      max-delay-seconds:
        type: integer
        minimum: 0
    additionalProperties: true
  notifications:
    type: object
    properties:
      review-changes-requested:
        type: object
        properties:
          pull-request-review:
            type: boolean
          pull-request-comment:
            type: boolean
          issue-comment:
            type: boolean
        additionalProperties: true
    additionalProperties: true
  completion:
    type: object
    properties:
      remove_labels:
        type: array
        items:
          type: string
      add_labels:
        type: array
        items:
          type: string
      auto-merge:
        type: object
        properties:
          enabled:
            type: boolean
          method:
            type: string
            enum: [squash, merge, rebase]
          delete-branch:
            type: boolean
        additionalProperties: true
    additionalProperties: true
  orchestrator:
    type: object
    required: [actor]
    properties:
      actor:
        type: string
    additionalProperties: true
  runtimes:
    type: object
    additionalProperties:
      type: object
      additionalProperties: true
  actors:
    type: object
    additionalProperties:
      type: object
      required: [runtime]
      properties:
        runtime:
          type: string
        model:
          type: string
        mode:
          type: string
        skills:
          type: array
          items:
            type: string
      additionalProperties: true
  stages:
    type: object
    additionalProperties:
      type: object
      properties:
        actors:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string
        gates:
          type: array
          items:
            type: string
        next:
          type: string
      additionalProperties: true
  gates:
    type: object
    additionalProperties:
      type: object
      required: [type]
      properties:
        type:
          enum: [orchestrator-evaluated]
      additionalProperties: true
  actions:
    type: object
    additionalProperties:
      type: object
      required: [type]
      properties:
        type:
          type: string
      additionalProperties: true
  storage:
    type: object
    additionalProperties: true
additionalProperties: true
