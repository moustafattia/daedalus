$schema: http://json-schema.org/draft-07/schema#
title: code-review workflow config (placeholder)
type: object
required: [workflow, schema-version]
properties:
  workflow:
    const: code-review
  schema-version:
    type: integer
    enum: [1]
additionalProperties: true
