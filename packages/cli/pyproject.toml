[build-system]
requires = ["setuptools>=66", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sprints-cli"
version = "0.3.0"
description = "Standalone CLI for Sprints."
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Sprints"}]
dependencies = [
  "sprints-core",
]

[project.scripts]
sprints = "sprints_cli.main:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
