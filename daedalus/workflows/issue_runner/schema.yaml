$schema: http://json-schema.org/draft-07/schema#
title: issue-runner workflow config
type: object
required:
  - workflow
  - schema-version
  - instance
  - repository
  - tracker
  - workspace
  - agent
  - storage
properties:
  workflow:
    const: issue-runner
  schema-version:
    type: integer
    enum: [1]

  instance:
    type: object
    required: [name, engine-owner]
    properties:
      name: {type: string}
      engine-owner:
        type: string
        enum: [hermes, openclaw]

  repository:
    type: object
    required: [local-path]
    properties:
      local-path: {type: string}
      slug: {type: string}

  tracker:
    type: object
    required: [kind]
    properties:
      kind:
        type: string
        enum: [linear, github]
      github_slug: {type: string}
      endpoint: {type: string}
      api_key: {type: string}
      project_slug: {type: string}
      active_states:
        type: array
        items: {type: string}
      terminal_states:
        type: array
        items: {type: string}
      required_labels:
        type: array
        items: {type: string}
      exclude_labels:
        type: array
        items: {type: string}
      active-states:
        type: array
        items: {type: string}
      terminal-states:
        type: array
        items: {type: string}
      required-labels:
        type: array
        items: {type: string}
      exclude-labels:
        type: array
        items: {type: string}

  polling:
    type: object
    properties:
      interval_ms:
        type: integer
        minimum: 1
      interval-seconds:
        type: integer
        minimum: 1

  workspace:
    type: object
    required: [root]
    properties:
      root: {type: string}

  hooks:
    type: object
    properties:
      after_create: {type: string}
      before_run: {type: string}
      after_run: {type: string}
      before_remove: {type: string}
      timeout_ms:
        type: integer
        minimum: 1
      after-create: {type: string}
      before-run: {type: string}
      after-run: {type: string}
      before-remove: {type: string}
      timeout-seconds:
        type: integer
        minimum: 1

  agent:
    type: object
    required: [name, model, runtime]
    properties:
      name: {type: string}
      model: {type: string}
      runtime: {type: string, default: codex-app-server}
      required-capabilities:
        $ref: "#/definitions/runtime-capability-list"
      command:
        type: array
        minItems: 1
        items: {type: string}
      max_concurrent_agents:
        type: integer
        minimum: 1
      max_turns:
        type: integer
        minimum: 1
      max_retry_backoff_ms:
        type: integer
        minimum: 0
      max_concurrent_agents_by_state:
        type: object
        additionalProperties:
          type: integer
          minimum: 1
      max-concurrent-issues:
        type: integer
        minimum: 1

  daedalus:
    type: object
    properties:
      runtimes:
        type: object
        minProperties: 1
        additionalProperties:
          oneOf:
            - $ref: "#/definitions/acpx-codex-runtime"
            - $ref: "#/definitions/claude-cli-runtime"
            - $ref: "#/definitions/codex-app-server-runtime"
            - $ref: "#/definitions/hermes-agent-runtime"

  runtimes:
    type: object
    minProperties: 1
    additionalProperties:
      oneOf:
        - $ref: "#/definitions/acpx-codex-runtime"
        - $ref: "#/definitions/claude-cli-runtime"
        - $ref: "#/definitions/codex-app-server-runtime"
        - $ref: "#/definitions/hermes-agent-runtime"

  storage:
    type: object
    required: [status, health, audit-log]
    properties:
      status: {type: string}
      health: {type: string}
      audit-log: {type: string}
      scheduler: {type: string}

  retention:
    type: object
    properties:
      events:
        type: object
        properties:
          max-age-days:
            type: number
            minimum: 0
          max-rows:
            type: integer
            minimum: 0
          max_age_days:
            type: number
            minimum: 0
          max_rows:
            type: integer
            minimum: 0

  workflow-policy:
    type: string

definitions:
  runtime-capability-list:
    type: array
    items:
      type: string
      enum:
        - prompt-turn
        - command-stage
        - one-shot
        - persistent-session
        - resume
        - cancel
        - structured-events
        - token-metrics
        - thread-visible
        - activity-heartbeat
        - service-required

  acpx-codex-runtime:
    type: object
    required: [kind]
    properties:
      kind:
        const: acpx-codex
      session-idle-freshness-seconds: {type: integer}
      session-idle-grace-seconds: {type: integer}
      session-nudge-cooldown-seconds: {type: integer}
      command:
        type: array
        minItems: 1
        items: {type: string}
      mode:
        type: string
        enum: [final, chat]
      executable: {type: string}
      profile: {type: string}
      provider: {type: string}
      source: {type: string}
      max-turns: {type: integer, minimum: 1}
      max_turns: {type: integer, minimum: 1}
      timeout-seconds: {type: integer, minimum: 1}
      timeout_seconds: {type: integer, minimum: 1}
      toolsets:
        oneOf:
          - type: string
          - type: array
            items: {type: string}
      skills:
        oneOf:
          - type: string
          - type: array
            items: {type: string}
      yolo: {type: boolean}
      pass-session-id: {type: boolean}
      pass_session_id: {type: boolean}
      ignore-user-config: {type: boolean}
      ignore_user_config: {type: boolean}
      ignore-rules: {type: boolean}
      ignore_rules: {type: boolean}
      continue:
        oneOf:
          - type: boolean
          - type: string
      extra-args:
        type: array
        items: {type: string}
      extra_args:
        type: array
        items: {type: string}
  claude-cli-runtime:
    type: object
    required: [kind]
    properties:
      kind:
        const: claude-cli
      max-turns-per-invocation: {type: integer}
      timeout-seconds: {type: integer}
      command:
        type: array
        minItems: 1
        items: {type: string}
  codex-app-server-runtime:
    type: object
    required: [kind]
    properties:
      kind:
        const: codex-app-server
      stage-command: {type: boolean}
      stage_command: {type: boolean}
      command:
        oneOf:
          - type: string
          - type: array
            minItems: 1
            items: {type: string}
      mode:
        type: string
        enum: [managed, external]
      endpoint: {type: string}
      healthcheck_path: {type: string}
      ws_token_env: {type: string}
      ws_token_file: {type: string}
      ephemeral: {type: boolean}
      approval_policy:
        oneOf:
          - type: string
            enum: [untrusted, on-failure, on-request, never]
          - type: object
      thread_sandbox:
        type: string
        enum: [read-only, workspace-write, danger-full-access]
      turn_sandbox_policy:
        oneOf:
          - type: string
            enum: [read-only, workspace-write, danger-full-access]
          - type: object
      turn_timeout_ms:
        type: integer
        minimum: 1
      read_timeout_ms:
        type: integer
        minimum: 1
      stall_timeout_ms:
        type: integer
        minimum: 0
  hermes-agent-runtime:
    type: object
    required: [kind]
    properties:
      kind:
        const: hermes-agent
      command:
        type: array
        minItems: 1
        items: {type: string}
