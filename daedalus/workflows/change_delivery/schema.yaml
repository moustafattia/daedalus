$schema: http://json-schema.org/draft-07/schema#
title: change-delivery workflow config
type: object
required:
  - workflow
  - schema-version
  - instance
  - repository
  - tracker
  - code-host
  - runtimes
  - agents
  - gates
  - triggers
  - storage
properties:
  workflow:
    const: change-delivery
  schema-version:
    type: integer
    enum: [1]

  instance:
    type: object
    required: [name, engine-owner]
    properties:
      name:
        type: string
        description: "Workflow instance id. New roots should use <owner>-<repo>-<workflow-type> and match the directory name under ~/.hermes/workflows/."
      engine-owner: {type: string, enum: [hermes, openclaw]}

  repository:
    type: object
    required: [local-path, slug, active-lane-label]
    additionalProperties: false
    properties:
      local-path: {type: string}
      slug: {type: string}
      active-lane-label: {type: string}

  tracker:
    type: object
    required: [kind, github_slug]
    additionalProperties: false
    properties:
      kind:
        type: string
        enum: [github]
      github_slug: {type: string}
      active_states:
        type: array
        items: {type: string}
      terminal_states:
        type: array
        items: {type: string}
      active-states:
        type: array
        items: {type: string}
      terminal-states:
        type: array
        items: {type: string}

  code-host:
    type: object
    required: [kind, github_slug]
    additionalProperties: false
    properties:
      kind:
        type: string
        enum: [github]
      github_slug: {type: string}

  tracker-feedback:
    $ref: "#/definitions/tracker-feedback"

  runtimes:
    type: object
    minProperties: 1
    additionalProperties:
      oneOf:
        - $ref: "#/definitions/acpx-codex-runtime"
        - $ref: "#/definitions/codex-app-server-runtime"
        - $ref: "#/definitions/claude-cli-runtime"
        - $ref: "#/definitions/hermes-agent-runtime"

  agents:
    type: object
    required: [coder, internal-reviewer, external-reviewer]
    properties:
      coder:
        type: object
        minProperties: 1
        additionalProperties:
          $ref: "#/definitions/coder-tier"
      internal-reviewer:
        type: object
        required: [name, model, runtime]
        properties:
          name: {type: string}
          model: {type: string}
          runtime: {type: string}
          freeze-coder-while-running: {type: boolean}
          command:
            type: array
            items: {type: string}
            minItems: 1
          prompt: {type: string}
      external-reviewer:
        type: object
        required: [enabled, name]
        properties:
          enabled: {type: boolean}
          name: {type: string}
          kind:
            type: string
            enum: [github-comments, disabled]
          provider:
            type: string
            description: "Informational label only; reviewer behavior is selected via 'kind'."
          cache-seconds: {type: integer}
          repo-slug: {type: string}
          logins:
            type: array
            items: {type: string}
          clean-reactions:
            type: array
            items: {type: string}
          pending-reactions:
            type: array
            items: {type: string}
      advisory-reviewer:
        type: object
        required: [enabled, name]
        properties:
          enabled: {type: boolean}
          name: {type: string}
          command:
            type: array
            items: {type: string}
            minItems: 1
          prompt: {type: string}

  gates:
    type: object
    required: [internal-review, external-review, merge]
    properties:
      internal-review:
        type: object
        properties:
          pass-with-findings-tolerance: {type: integer}
          require-pass-clean-before-publish: {type: boolean}
          request-cooldown-seconds: {type: integer}
      external-review:
        type: object
        properties:
          required-for-merge: {type: boolean}
      merge:
        type: object
        properties:
          require-ci-acceptable: {type: boolean}

  triggers:
    type: object
    required: [lane-selector]
    properties:
      lane-selector:
        type: object
        required: [type, label]
        properties:
          type: {type: string}
          label: {type: string}
      start-conditions:
        type: array
        items: {type: object}

  escalation:
    type: object
    additionalProperties: {type: integer}

  schedules:
    type: object
    properties:
      watchdog-tick:
        type: object
        properties:
          interval-minutes: {type: integer}
      milestone-notifier:
        type: object
        properties:
          interval-hours: {type: integer}
          delivery:
            type: object
            properties:
              channel: {type: string}
              chat-id: {type: string}

  jobs:
    type: object
    properties:
      core:
        type: array
        items: {type: string}
      support:
        type: array
        items: {type: string}
      watchdog: {type: string}
      checker: {type: string}
      internal-review-runner: {type: string}
      milestone-notifier: {type: string}
      issue-watcher-regex: {type: string}

  prompts:
    type: object
    additionalProperties: {type: string}

  storage:
    type: object
    required: [ledger, health, audit-log]
    properties:
      ledger: {type: string}
      health: {type: string}
      audit-log: {type: string}
      scheduler: {type: string}
      cron-jobs-path: {type: string}
      hermes-cron-jobs-path: {type: string}
      sessions-state: {type: string}

  retention:
    type: object
    properties:
      events:
        type: object
        properties:
          max-age-days:
            type: number
            minimum: 0
          max-rows:
            type: integer
            minimum: 0
          max_age_days:
            type: number
            minimum: 0
          max_rows:
            type: integer
            minimum: 0

  codex-bot:
    type: object
    properties:
      logins:
        type: array
        items: {type: string}
      clean-reactions:
        type: array
        items: {type: string}
      pending-reactions:
        type: array
        items: {type: string}

  lane-selection:
    type: object
    additionalProperties: false
    properties:
      require-labels:
        type: array
        items: {type: string}
      allow-any-of:
        type: array
        items: {type: string}
      exclude-labels:
        type: array
        items: {type: string}
      priority:
        type: array
        items: {type: string}
      tiebreak:
        type: string
        enum: [oldest, newest, random]

  server:
    type: object
    additionalProperties: false
    properties:
      port:
        type: integer
        minimum: 0
        maximum: 65535
      bind:
        type: string

  webhooks:
    type: array
    items:
      type: object
      required: [name, kind]
      additionalProperties: false
      properties:
        name: {type: string}
        kind:
          type: string
          enum: [http-json, slack-incoming, disabled]
        enabled: {type: boolean}
        url: {type: string}
        events:
          type: array
          items: {type: string}
        headers:
          type: object
          additionalProperties: {type: string}
        timeout-seconds: {type: integer, minimum: 1, maximum: 30}
        retry-count: {type: integer, minimum: 0, maximum: 5}

  stall:
    type: object
    additionalProperties: false
    properties:
      timeout_ms:
        type: integer
        minimum: 0
        default: 300000
        description: "Worker terminated if its runtime has shown no activity for this long. 0 = disabled."

definitions:
  tracker-feedback:
    type: object
    additionalProperties: false
    properties:
      enabled: {type: boolean}
      comment-mode:
        type: string
        enum: [append]
      include:
        type: array
        items: {type: string}
      state-updates:
        type: object
        additionalProperties: false
        properties:
          enabled: {type: boolean}
        patternProperties:
          "^on[-_.A-Za-z0-9]+$":
            type: string

  acpx-codex-runtime:
    type: object
    additionalProperties: false
    required: [kind, session-idle-freshness-seconds, session-idle-grace-seconds, session-nudge-cooldown-seconds]
    properties:
      kind: {const: acpx-codex}
      session-idle-freshness-seconds: {type: integer, minimum: 1}
      session-idle-grace-seconds: {type: integer, minimum: 1}
      session-nudge-cooldown-seconds: {type: integer, minimum: 1}
      command:
        type: array
        items: {type: string}
        minItems: 1

  codex-app-server-runtime:
    type: object
    additionalProperties: false
    required: [kind]
    properties:
      kind: {const: codex-app-server}
      command:
        oneOf:
          - type: string
          - type: array
            items: {type: string}
            minItems: 1
      mode:
        type: string
        enum: [managed, external]
      endpoint: {type: string}
      healthcheck_path: {type: string}
      ws_token_env: {type: string}
      ws_token_file: {type: string}
      ephemeral: {type: boolean}
      keep_alive: {type: boolean}
      keep-alive: {type: boolean}
      approval_policy:
        oneOf:
          - type: string
            enum: [untrusted, on-failure, on-request, never]
          - type: object
      thread_sandbox: {type: string}
      turn_sandbox_policy:
        oneOf:
          - type: string
            enum: [auto, read-only, workspace-write, danger-full-access]
          - type: object
      turn_timeout_ms: {type: integer, minimum: 1}
      read_timeout_ms: {type: integer, minimum: 1}
      stall_timeout_ms: {type: integer, minimum: 0}

  claude-cli-runtime:
    type: object
    additionalProperties: false
    required: [kind, max-turns-per-invocation, timeout-seconds]
    properties:
      kind: {const: claude-cli}
      max-turns-per-invocation: {type: integer, minimum: 1}
      timeout-seconds: {type: integer, minimum: 1}
      command:
        type: array
        items: {type: string}
        minItems: 1

  hermes-agent-runtime:
    type: object
    additionalProperties: false
    required: [kind]
    properties:
      kind: {const: hermes-agent}
      command:
        type: array
        items: {type: string}
        minItems: 1

  coder-tier:
    type: object
    additionalProperties: false
    required: [name, model, runtime]
    properties:
      name: {type: string}
      model: {type: string}
      runtime: {type: string}
      command:
        type: array
        items: {type: string}
        minItems: 1
      prompt: {type: string}
