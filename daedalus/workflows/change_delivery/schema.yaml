$schema: http://json-schema.org/draft-07/schema#
title: change-delivery workflow config
type: object
required:
  - workflow
  - schema-version
  - instance
  - repository
  - tracker
  - code-host
  - runtimes
  - actors
  - stages
  - gates
  - triggers
  - storage
properties:
  workflow:
    const: change-delivery
  schema-version:
    type: integer
    enum: [1]

  instance:
    type: object
    required: [name, engine-owner]
    properties:
      name:
        type: string
        description: "Workflow instance id. New roots should use <owner>-<repo>-<workflow-type> and match the directory name under ~/.hermes/workflows/."
      engine-owner: {type: string, enum: [hermes, openclaw]}

  repository:
    type: object
    required: [local-path, slug, active-lane-label]
    additionalProperties: false
    properties:
      local-path: {type: string}
      slug: {type: string}
      active-lane-label: {type: string}

  tracker:
    type: object
    required: [kind, github_slug]
    additionalProperties: false
    properties:
      kind:
        type: string
        enum: [github]
      github_slug: {type: string}
      active_states:
        type: array
        items: {type: string}
      terminal_states:
        type: array
        items: {type: string}
      active-states:
        type: array
        items: {type: string}
      terminal-states:
        type: array
        items: {type: string}

  code-host:
    type: object
    required: [kind, github_slug]
    additionalProperties: false
    properties:
      kind:
        type: string
        enum: [github]
      github_slug: {type: string}

  tracker-feedback:
    $ref: "#/definitions/tracker-feedback"

  runtimes:
    type: object
    minProperties: 1
    additionalProperties:
      oneOf:
        - $ref: "#/definitions/acpx-codex-runtime"
        - $ref: "#/definitions/codex-app-server-runtime"
        - $ref: "#/definitions/claude-cli-runtime"
        - $ref: "#/definitions/hermes-agent-runtime"

  actors:
    type: object
    required: [implementer, implementer-high-effort, reviewer]
    minProperties: 1
    additionalProperties:
      $ref: "#/definitions/actor"

  stages:
    type: object
    required: [implement, publish, merge]
    properties:
      implement:
        $ref: "#/definitions/implementation-stage"
      publish:
        $ref: "#/definitions/publish-stage"
      merge:
        $ref: "#/definitions/merge-stage"
    additionalProperties:
      oneOf:
        - $ref: "#/definitions/actor-stage"
        - $ref: "#/definitions/action-stage"

  gates:
    type: object
    required: [pre-publish-review, maintainer-approval, ci-green]
    properties:
      pre-publish-review:
        $ref: "#/definitions/agent-review-gate"
      maintainer-approval:
        $ref: "#/definitions/pr-comment-approval-gate"
      ci-green:
        $ref: "#/definitions/code-host-checks-gate"
    additionalProperties:
      oneOf:
        - $ref: "#/definitions/agent-review-gate"
        - $ref: "#/definitions/pr-comment-approval-gate"
        - $ref: "#/definitions/code-host-checks-gate"

  triggers:
    type: object
    required: [lane-selector]
    properties:
      lane-selector:
        type: object
        required: [type, label]
        properties:
          type: {type: string}
          label: {type: string}
      start-conditions:
        type: array
        items: {type: object}

  escalation:
    type: object
    additionalProperties: {type: integer}

  schedules:
    type: object
    properties:
      watchdog-tick:
        type: object
        properties:
          interval-minutes: {type: integer}
      milestone-notifier:
        type: object
        properties:
          interval-hours: {type: integer}
          delivery:
            type: object
            properties:
              channel: {type: string}
              chat-id: {type: string}

  jobs:
    type: object
    properties:
      core:
        type: array
        items: {type: string}
      support:
        type: array
        items: {type: string}
      watchdog: {type: string}
      checker: {type: string}
      internal-review-runner: {type: string}
      milestone-notifier: {type: string}
      issue-watcher-regex: {type: string}

  prompts:
    type: object
    additionalProperties: {type: string}

  storage:
    type: object
    required: [ledger, health, audit-log]
    properties:
      ledger: {type: string}
      health: {type: string}
      audit-log: {type: string}
      scheduler: {type: string}
      cron-jobs-path: {type: string}
      hermes-cron-jobs-path: {type: string}
      sessions-state: {type: string}

  retention:
    type: object
    properties:
      events:
        type: object
        properties:
          max-age-days:
            type: number
            minimum: 0
          max-rows:
            type: integer
            minimum: 0
          max_age_days:
            type: number
            minimum: 0
          max_rows:
            type: integer
            minimum: 0

  lane-selection:
    type: object
    additionalProperties: false
    properties:
      require-labels:
        type: array
        items: {type: string}
      allow-any-of:
        type: array
        items: {type: string}
      exclude-labels:
        type: array
        items: {type: string}
      priority:
        type: array
        items: {type: string}
      tiebreak:
        type: string
        enum: [oldest, newest, random]

  server:
    type: object
    additionalProperties: false
    properties:
      port:
        type: integer
        minimum: 0
        maximum: 65535
      bind:
        type: string

  webhooks:
    type: array
    items:
      type: object
      required: [name, kind]
      additionalProperties: false
      properties:
        name: {type: string}
        kind:
          type: string
          enum: [http-json, slack-incoming, disabled]
        enabled: {type: boolean}
        url: {type: string}
        events:
          type: array
          items: {type: string}
        headers:
          type: object
          additionalProperties: {type: string}
        timeout-seconds: {type: integer, minimum: 1, maximum: 30}
        retry-count: {type: integer, minimum: 0, maximum: 5}

  stall:
    type: object
    additionalProperties: false
    properties:
      timeout_ms:
        type: integer
        minimum: 0
        default: 300000
        description: "Worker terminated if its runtime has shown no activity for this long. 0 = disabled."

definitions:
  tracker-feedback:
    type: object
    additionalProperties: false
    properties:
      enabled: {type: boolean}
      comment-mode:
        type: string
        enum: [append, upsert]
      include:
        type: array
        items: {type: string}
      state-updates:
        type: object
        additionalProperties: false
        properties:
          enabled: {type: boolean}
        patternProperties:
          "^on[-_.A-Za-z0-9]+$":
            type: string

  actor:
    type: object
    additionalProperties: false
    required: [name, model, runtime]
    properties:
      name: {type: string}
      model: {type: string}
      runtime: {type: string, default: codex-app-server}
      required-capabilities:
        $ref: "#/definitions/runtime-capability-list"
      command:
        type: array
        items: {type: string}
        minItems: 1
      prompt: {type: string}
      freeze-actor-while-running: {type: boolean}

  actor-stage:
    type: object
    additionalProperties: false
    required: [actor]
    properties:
      actor: {type: string}
      prompt: {type: string}
      new-context: {type: boolean}
      escalation:
        type: object
        additionalProperties: false
        properties:
          after-attempts:
            type: integer
            minimum: 1
          actor: {type: string}

  implementation-stage:
    type: object
    additionalProperties: false
    required: [actor, escalation]
    properties:
      actor: {type: string}
      prompt: {type: string}
      new-context: {type: boolean}
      escalation:
        type: object
        additionalProperties: false
        required: [after-attempts, actor]
        properties:
          after-attempts:
            type: integer
            minimum: 1
          actor: {type: string}

  publish-stage:
    type: object
    additionalProperties: false
    required: [action]
    properties:
      action: {const: pr.publish}

  merge-stage:
    type: object
    additionalProperties: false
    required: [action]
    properties:
      action: {const: pr.merge}

  action-stage:
    type: object
    additionalProperties: false
    required: [action]
    properties:
      action:
        type: string
        enum: [pr.publish, pr.update, pr.merge]

  agent-review-gate:
    type: object
    additionalProperties: false
    required: [type, actor]
    properties:
      type: {const: agent-review}
      actor: {type: string}
      new-context: {type: boolean}
      pass-with-findings-tolerance:
        type: integer
        minimum: 0
      require-pass-clean-before-publish: {type: boolean}
      request-cooldown-seconds:
        type: integer
        minimum: 0
      freeze-actor-while-running: {type: boolean}

  pr-comment-approval-gate:
    type: object
    additionalProperties: false
    required: [type]
    properties:
      type: {const: pr-comment-approval}
      enabled: {type: boolean}
      name: {type: string}
      required-for-merge: {type: boolean}
      users:
        type: array
        items: {type: string}
      logins:
        type: array
        items: {type: string}
      approvals:
        type: array
        items: {type: string}
      clean-reactions:
        type: array
        items: {type: string}
      pending-reactions:
        type: array
        items: {type: string}
      cache-seconds:
        type: integer
        minimum: 0
      repo-slug: {type: string}

  code-host-checks-gate:
    type: object
    additionalProperties: false
    required: [type]
    properties:
      type: {const: code-host-checks}
      required-for-merge: {type: boolean}

  runtime-capability-list:
    type: array
    items:
      type: string
      enum:
        - prompt-turn
        - command-stage
        - one-shot
        - persistent-session
        - resume
        - cancel
        - structured-events
        - token-metrics
        - thread-visible
        - activity-heartbeat
        - service-required

  acpx-codex-runtime:
    type: object
    additionalProperties: false
    required: [kind, session-idle-freshness-seconds, session-idle-grace-seconds, session-nudge-cooldown-seconds]
    properties:
      kind: {const: acpx-codex}
      session-idle-freshness-seconds: {type: integer, minimum: 1}
      session-idle-grace-seconds: {type: integer, minimum: 1}
      session-nudge-cooldown-seconds: {type: integer, minimum: 1}
      command:
        type: array
        items: {type: string}
        minItems: 1

  codex-app-server-runtime:
    type: object
    additionalProperties: false
    required: [kind]
    properties:
      kind: {const: codex-app-server}
      command:
        oneOf:
          - type: string
          - type: array
            items: {type: string}
            minItems: 1
      mode:
        type: string
        enum: [managed, external]
      endpoint: {type: string}
      healthcheck_path: {type: string}
      ws_token_env: {type: string}
      ws_token_file: {type: string}
      ephemeral: {type: boolean}
      keep_alive: {type: boolean}
      keep-alive: {type: boolean}
      approval_policy:
        oneOf:
          - type: string
            enum: [untrusted, on-failure, on-request, never]
          - type: object
      thread_sandbox: {type: string}
      turn_sandbox_policy:
        oneOf:
          - type: string
            enum: [auto, read-only, workspace-write, danger-full-access]
          - type: object
      turn_timeout_ms: {type: integer, minimum: 1}
      read_timeout_ms: {type: integer, minimum: 1}
      stall_timeout_ms: {type: integer, minimum: 0}

  claude-cli-runtime:
    type: object
    additionalProperties: false
    required: [kind, max-turns-per-invocation, timeout-seconds]
    properties:
      kind: {const: claude-cli}
      max-turns-per-invocation: {type: integer, minimum: 1}
      timeout-seconds: {type: integer, minimum: 1}
      command:
        type: array
        items: {type: string}
        minItems: 1

  hermes-agent-runtime:
    type: object
    additionalProperties: false
    required: [kind]
    properties:
      kind: {const: hermes-agent}
      command:
        type: array
        items: {type: string}
        minItems: 1
      mode:
        type: string
        enum: [final, chat]
      executable: {type: string}
      profile: {type: string}
      provider: {type: string}
      source: {type: string}
      max-turns: {type: integer, minimum: 1}
      max_turns: {type: integer, minimum: 1}
      timeout-seconds: {type: integer, minimum: 1}
      timeout_seconds: {type: integer, minimum: 1}
      toolsets:
        oneOf:
          - type: string
          - type: array
            items: {type: string}
      skills:
        oneOf:
          - type: string
          - type: array
            items: {type: string}
      yolo: {type: boolean}
      pass-session-id: {type: boolean}
      pass_session_id: {type: boolean}
      ignore-user-config: {type: boolean}
      ignore_user_config: {type: boolean}
      ignore-rules: {type: boolean}
      ignore_rules: {type: boolean}
      continue:
        oneOf:
          - type: boolean
          - type: string
      extra-args:
        type: array
        items: {type: string}
      extra_args:
        type: array
        items: {type: string}
